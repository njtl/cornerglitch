services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glitch
      POSTGRES_PASSWORD: glitch
      POSTGRES_DB: glitch
    ports:
      - "${GLITCH_DB_PORT:-5432}:5432"
    volumes:
      - glitch-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glitch"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  glitch:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GLITCH_PORT:-8765}:8765"
      - "${GLITCH_DASH_PORT:-8766}:8766"
      - "${GLITCH_TLS_PORT:-8767}:8767"
    environment:
      - GLITCH_ADMIN_PASSWORD=${GLITCH_ADMIN_PASSWORD:-admin}
      - GLITCH_CONFIG=${GLITCH_CONFIG:-}
      - GLITCH_DB_URL=postgres://glitch:glitch@postgres:5432/glitch?sslmode=disable
      - GLITCH_HEALTH_SECRET=${GLITCH_HEALTH_SECRET:-docker-healthcheck-secret}
    volumes:
      - ./config.json:/etc/glitch/config.json:ro
      - ./captures:/data/captures
    command: >-
      sh -c '/glitch
      -port 8765
      -dash-port 8766
      -tls-port 8767
      ${GLITCH_CONFIG:+-config /etc/glitch/config.json}'
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8765/_internal/$${GLITCH_HEALTH_SECRET}/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  glitch-pgdata:
