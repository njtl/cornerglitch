services:
  glitch:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GLITCH_PORT:-8765}:8765"
      - "${GLITCH_DASH_PORT:-8766}:8766"
    environment:
      - GLITCH_CONFIG=${GLITCH_CONFIG:-}
    volumes:
      - ./config.json:/etc/glitch/config.json:ro
      - ./captures:/data/captures
    command: >-
      sh -c '/glitch
      -port 8765
      -dash-port 8766
      ${GLITCH_CONFIG:+-config /etc/glitch/config.json}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
