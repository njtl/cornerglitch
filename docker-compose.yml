services:
  glitch:
    build: .
    ports:
      - "8765:8765"
      - "8766:8766"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  glitch-proxy:
    build: .
    entrypoint: ["/glitch-proxy"]
    command: ["-target", "http://backend:80", "-listen", ":8080"]
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles:
      - proxy
    depends_on:
      - glitch

  # Example backend for proxy mode testing
  backend:
    image: nginx:alpine
    profiles:
      - proxy
