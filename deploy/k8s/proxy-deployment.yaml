apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitch-proxy
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glitch-server
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitch-server
        app.kubernetes.io/component: proxy
    spec:
      containers:
        - name: glitch-proxy
          image: glitch-server:latest
          command: ["/glitch-proxy"]
          args:
            - "-target"
            - "$(PROXY_TARGET)"
            - "-listen"
            - ":8080"
            - "-threshold"
            - "$(PROXY_THRESHOLD)"
            - "-mode"
            - "$(PROXY_MODE)"
            - "-dashboard"
            - "$(PROXY_DASHBOARD_PORT)"
          env:
            - name: PROXY_TARGET
              value: "http://backend-service:80"
            - name: PROXY_THRESHOLD
              value: "50"
            - name: PROXY_MODE
              value: "glitch"
            - name: PROXY_DASHBOARD_PORT
              value: "8766"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: glitch-proxy
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glitch-proxy
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: proxy
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  # Uncomment the tls block below to enable TLS
  # tls:
  #   - hosts:
  #       - proxy.glitch.example.com
  #     secretName: glitch-proxy-tls-secret
  rules:
    - host: proxy.glitch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glitch-proxy
                port:
                  name: http
