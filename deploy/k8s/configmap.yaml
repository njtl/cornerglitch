apiVersion: v1
kind: ConfigMap
metadata:
  name: glitch-config
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: server
data:
  config.json: |
    {
      "version": "1.0.0",
      "error_profiles": {
        "default": {
          "enabled": true
        }
      },
      "adaptive": {
        "enabled": true,
        "reevaluate_interval_seconds": 30
      },
      "labyrinth": {
        "enabled": true,
        "max_depth": 50
      },
      "fingerprint": {
        "enabled": true
      },
      "dashboard": {
        "enabled": true
      }
    }
