apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitch-server
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glitch-server
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitch-server
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: glitch
          image: ghcr.io/njtl/glitch-server:latest
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
            - name: admin
              containerPort: 8766
              protocol: TCP
          args:
            - "-port"
            - "8765"
            - "-dash-port"
            - "8766"
            - "-config"
            - "/etc/glitch/config.json"
          env:
            - name: GLITCH_DB_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: GLITCH_DB_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: config
              mountPath: /etc/glitch
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: glitch-config
        - name: tmp
          emptyDir: {}
