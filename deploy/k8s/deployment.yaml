apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitch-server
  namespace: glitch-server
  labels:
    app.kubernetes.io/name: glitch-server
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: glitch-server
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitch-server
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: glitch
          image: glitch-server:latest
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
            - name: dashboard
              containerPort: 8766
              protocol: TCP
          env:
            - name: GLITCH_PORT
              value: "8765"
            - name: GLITCH_DASH_PORT
              value: "8766"
          args:
            - "-port"
            - "8765"
            - "-dash-port"
            - "8766"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
