name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: glitch
          POSTGRES_PASSWORD: glitch
          POSTGRES_DB: glitch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glitch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      GLITCH_DB_URL: postgres://glitch:glitch@localhost:5432/glitch?sslmode=disable
      GLITCH_ADMIN_PASSWORD: ci-test-password
      GLITCH_HEALTH_SECRET: ci-health-secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build server
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o glitch ./cmd/glitch

      - name: Start server
        run: |
          nohup ./glitch -port 8765 -dash-port 8766 > /tmp/glitch.log 2>&1 &
          echo $! > /tmp/glitch.pid
          # Wait for server to be ready (use internal health path that bypasses chaos)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/_internal/${GLITCH_HEALTH_SECRET}/healthz > /dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              cat /tmp/glitch.log
              exit 1
            fi
            sleep 1
          done
          # Wait for admin panel
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8766/admin/api/metrics > /dev/null 2>&1; then
              echo "Admin panel is ready (attempt $i)"
              break
            fi
            sleep 1
          done

      - name: Run tests
        run: go test ./... -count=1 -v -timeout 600s

      - name: Show server logs on failure
        if: failure()
        run: cat /tmp/glitch.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/glitch.pid ]; then
            kill $(cat /tmp/glitch.pid) 2>/dev/null || true
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o glitch ./cmd/glitch

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-linux-amd64
          path: glitch
          retention-days: 14
